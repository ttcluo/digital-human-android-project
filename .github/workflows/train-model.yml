#===============================================================================
# GitHub Actions - 模型训练流水线
# 用于在GPU服务器上训练模型
#===============================================================================

name: Model Training

on:
  workflow_dispatch:
    inputs:
      config_file:
        description: '训练配置文件'
        required: true
        default: 'configs/train_config.yaml'
      epochs:
        description: '训练轮数'
        required: false
        default: '100'
      gpu_id:
        description: 'GPU ID'
        required: false
        default: '0'

jobs:
  train:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pyyaml
    
    - name: Download dataset
      run: |
        echo "下载训练数据集..."
        # 这里添加数据集下载逻辑
    
    - name: Run training
      run: |
        python -m src.training.train \
          --config ${{ github.event.inputs.config_file }} \
          --epochs ${{ github.event.inputs.epochs }} \
          --gpu ${{ github.event.inputs.gpu_id }}
      env:
        CUDA_VISIBLE_DEVICES: ${{ github.event.inputs.gpu_id }}
    
    - name: Upload model checkpoints
      uses: actions/upload-artifact@v3
      with:
        name: model-checkpoints
        path: checkpoints/
        retention-days: 30

  eval:
    runs-on: ubuntu-latest
    needs: train
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Download model
      uses: actions/download-artifact@v3
      with:
        name: model-checkpoints
    
    - name: Run evaluation
      run: |
        python -m src.training.evaluate \
          --checkpoint checkpoints/best_model.pth \
          --data_dir ./data/processed
    
    - name: Upload results
      uses: actions/upload-artifact@v3
      with:
        name: evaluation-results
        path: outputs/evaluation/
