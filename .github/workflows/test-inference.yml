#===============================================================================
# GitHub Actions - 推理测试流水线
# 用于测试模型推理性能
#===============================================================================

name: Inference Test

on:
  push:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  test-inference:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Download model
      run: |
        echo "下载预训练模型..."
        # 添加模型下载逻辑
    
    - name: Run inference test
      run: |
        python -m src.inference.test_inference \
          --model_path checkpoints/trained_models/best_model.pth \
          --test_data ./data/test
    
    - name: Benchmark performance
      run: |
        python -m src.inference.benchmark \
          --model_path checkpoints/trained_models/best_model.pth \
          --iterations 100
    
    - name: Export to ONNX
      run: |
        python -m src.inference.export_onnx \
          --model_path checkpoints/trained_models/best_model.pth \
          --output_path ./outputs/digital_human.onnx
    
    - name: Upload ONNX model
      uses: actions/upload-artifact@v3
      with:
        name: onnx-model
        path: outputs/digital_human.onnx

  android-build:
    runs-on: ubuntu-latest
    needs: test-inference
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Download ONNX model
      uses: actions/download-artifact@v3
      with:
        name: onnx-model
    
    - name: Copy model to Android assets
      run: |
        mkdir -p android/app/src/main/assets
        cp digital_human.onnx android/app/src/main/assets/
    
    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
    
    - name: Build release APK
      run: |
        cd android
        ./gradlew assembleRelease
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: android-release-apk
        path: android/app/build/outputs/apk/release/*.apk
